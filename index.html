<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Life System</title>

<meta name="theme-color" content="#11071b">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-180.png">

<style>
body{
background:#0a0215;
color:white;
font-family:Arial;
margin:0;
}

.hidden{display:none;}

button{
padding:10px;
border:none;
background:#6d28d9;
color:white;
border-radius:10px;
}

input,select{
padding:10px;
margin:5px 0;
width:100%;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
}

.container{padding:20px;}

.task{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<div id="auth" class="container">
<h2>Login</h2>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="senha">
<button onclick="login()">Entrar</button>
<button onclick="register()">Criar Conta</button>
</div>

<div id="app" class="hidden container">

<h2 id="user"></h2>

<button onclick="logout()">Sair</button>

<h3>XP: <span id="xp">0</span></h3>

<h3>Nova tarefa</h3>
<input id="name" placeholder="nome">
<input id="xpGain" placeholder="xp ganho">
<input id="xpLoss" placeholder="xp perdido">

<select id="type">
<option value="daily">Diária</option>
<option value="once">Avulsa</option>
</select>

<button onclick="addTask()">Adicionar</button>

<div id="tasks"></div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBWjvpKc5UzAsJSIjTczC0ZQTu0h8EWiRU",
authDomain: "solo-life-system-c370d.firebaseapp.com",
projectId: "solo-life-system-c370d",
storageBucket: "solo-life-system-c370d.appspot.com",
messagingSenderId: "834688060904",
appId: "1:834688060904:web:695984d69d24af7cca285d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user;
let data = {xp:0,tasks:[],lastReset:null};

auth.onAuthStateChanged(async u=>{
if(u){
user=u;
document.getElementById("auth").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("user").innerText=u.email;

await loadData();
dailyReset();
render();
}else{
document.getElementById("auth").classList.remove("hidden");
document.getElementById("app").classList.add("hidden");
}
});

async function register(){
await auth.createUserWithEmailAndPassword(
email.value,password.value);
}

async function login(){
await auth.signInWithEmailAndPassword(
email.value,password.value);
}

function logout(){
auth.signOut();
}

async function loadData(){
const ref=db.collection("users").doc(user.uid);
const doc=await ref.get();

if(!doc.exists){
await ref.set(data);
}else{
data=doc.data();
}
}

async function save(){
await db.collection("users").doc(user.uid).set(data);
}

function addTask(){
data.tasks.push({
id:Date.now(),
name:name.value,
xpGain:Number(xpGain.value),
xpLoss:Number(xpLoss.value),
type:type.value,
status:"pending",
lastDone:null
});
save();
render();
}
  function today(){
return new Date().toDateString();
}

function dailyReset(){
const t=today();

if(data.lastReset===t)return;

data.tasks.forEach(task=>{
if(task.type==="daily"){

if(task.status==="pending"){
data.xp=Math.max(0,data.xp-task.xpLoss);
}

task.status="pending";
task.lastDone=null;

}
});

data.lastReset=t;
save();
}

function complete(id){
const task=data.tasks.find(t=>t.id===id);
if(task.status==="done")return;

task.status="done";
task.lastDone=today();
data.xp+=task.xpGain;

save();
render();
}

function fail(id){
const task=data.tasks.find(t=>t.id===id);
task.status="failed";
data.xp=Math.max(0,data.xp-task.xpLoss);

save();
render();
}

function render(){
xp.innerText=data.xp;

tasks.innerHTML="";

data.tasks.forEach(t=>{
tasks.innerHTML+=`
<div class="task">
<b>${t.name}</b><br>
Tipo: ${t.type}<br>
Status: ${t.status}<br>

<button onclick="complete(${t.id})">Concluir</button>
<button onclick="fail(${t.id})">Falhar</button>
</div>
`;
});
}

</script>
</body>
</html>
